<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.png">
     <meta property="og:site_name" content="Jerry's Zenith Project" />
    <meta property="og:title" content="Jerry's Zenith Project" />
    <meta property="twitter:title" content="Jerry's Zenith Project" />
    <meta property="og:url" content="http://zenith.jerryliangportfolio.com/" />
    <meta property="og:type" content="website">
    <meta property="og:description" content="Check out my Freestyle Academy Senior Zenith Project!" />
    
    <meta property="og:image" content="http://zenith.jerryliangportfolio.com/site-preview.jpg"/>
    <meta property="og:image:secure_url" content="http://zenith.jerryliangportfolio.com/site-preview.jpg"/>
    <meta property="twitter:image" content="http://zenith.jerryliangportfolio.com/site-preview.jpg"/>
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:description" content="Check out my Freestyle Academy Senior Zenith Project">
    <title>Jerry's Zenith Project</title>
</head>
<style>
    @font-face{
        font-family: debug-font;
        src: url("Minecraft.otf");
    }
    @font-face{
        font-family: title-font;
        src: url("minecraft-five.ttf");
    }
    @font-face{
        font-family: intro-font;
        src: url("dale-adventure.ttf");
    }
    @font-face{
        font-family: body-font;
        src: url("Inter.ttf");
    }
    @keyframes fade-in{
        from{
            opacity: 0;
        }
    }
    body { margin: 0; position: relative; overflow: hidden; background: rgb(0, 0, 0);}
    .exhibit{
       width: 100% !important;
       height: 100% !important;
    }
    p{
        margin: 0;
    }
    .topLeftText{
        color: white;
        margin-left: 20px;
        margin-top: 10px;
        font-weight: 900;
        pointer-events: none;
        font-family: title-font;
        position: absolute;
        top: 0;
        left: 0;
    }
    #site-title{
        font-size: clamp(0.5em,1.5vw,3em);
    }
    #app{
        display: flex;
        justify-content: space-between;
        width: 100%;
        height: 100%;
        position: relative;
        z-index: 999;
    }
    .icons{
        display: flex;
        align-items: center;
        margin-right: 20px;
        position: absolute;
        top: 0;
        right: 0;
    }
    .icons > img{
        width: clamp(1em,4vw,3em);
        margin: 10px;
        cursor: pointer;
        transition: transform 0.25s ease;
    }
    .icons > img:hover{
        transform: translateY(-10px);
    }
    #instructions{
        position: absolute;
        display: block;
        font-family: body-font;
        font-weight: 700;
        top: 85vh;
        left: 50vw;
        transform: translateX(-50%);
        text-align: center;
        color: white;
        background-color: rgba(0,0,0,0.5);
        padding: 1em;
        border-radius: 0.25em;
        pointer-events: none;
        opacity: 1;
        transition: opacity 1.5s ease;
    }
    #instructions.hidden{
        opacity: 0;
    }
    #introScreen{
        position: absolute;
        top: 0;
        left: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: black;
        width: 100vw;
        height: 100vh;
        z-index: 99999;
        transition: opacity 3s ease;
    }
    #introScreen.hidden{
        pointer-events: none;
        opacity: 0;
    }
    .loadingText{
        color: white;
        font-family: intro-font;
        font-size: 3em;
        text-align: center;
    }
    @media(max-width: 768px){
        #instructions{
            top: 75vh;
            width: 70vw;
        }
    }
</style>
<body>
    <div id = "introScreen">
        <p id = "loadingText" class = "loadingText">Loading Your Experience...</p>
    </div>
    <div id = "app">
        <div class = "topLeftText">
            <p id = "site-title">House Project</p>
        </div>
        <div class = "icons">
            <img class = "website" alt = "home logo" src = "home.png" onclick = "location.assign('https://freestyleacademy.rocks/~JerryL/')">
            <img class = "youtube" alt = "youtube logo" src = "youtube.png" onclick = "location.assign('https://www.youtube.com/@small_j1337')">
            <img class = "instagram" alt = "instagram logo" src = "instagram.png" onclick = "location.assign('https://www.instagram.com/small_j1337/')">
        </div>
        <p id = "instructions">Click on a door (most doors will work) or the stairs to travel between rooms.<br>Tap or click anywhere to dismiss.</p>
    </div>
    <canvas id = "exhibit" class = "exhibit"></canvas>
    <script type="module" src="/main.js"></script>
</body>
</html>
